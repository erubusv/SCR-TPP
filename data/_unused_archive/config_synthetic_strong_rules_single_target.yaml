# Strongly discriminative synthetic data (single fixed target)
# single / pair / triplet x excitation / inhibition

time_horizon: 90.0
num_event_types: 13
num_samples: 1500
max_len: 256

# Sources: 0~11 (moderate base rates)
# Fixed target: 12 (low base rate)
base_intensity:
  0: 0.13
  1: 0.13
  2: 0.12
  3: 0.12
  4: 0.12
  5: 0.12
  6: 0.11
  7: 0.11
  8: 0.11
  9: 0.11
  10: 0.10
  11: 0.10
  12: 0.03

rules:
  # single excitation
  - id: 0
    target: 12
    W_pos: 4.0
    W_neg: 0.0
    bias: 0.0
    condition:
      0:
        peaks: [0.7]
        widths: [1.8]
        mix_weights: [1.0]

  # single inhibition
  - id: 1
    target: 12
    W_pos: 0.0
    W_neg: 3.8
    bias: 0.0
    condition:
      1:
        peaks: [0.7]
        widths: [1.8]
        mix_weights: [1.0]

