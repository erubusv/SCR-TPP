baselines:
- name: TELLER
  source_url: https://github.com/FengMingquan-sjtu/Logic_Point_Processes_ICLR
  implementation_type: official_equivalent_accelerated_teller
  command:
  - python
  - -m
  - workspace.benchmark_models.baselines.teller_official
  - --model
  - TELLER
  - --config
  - '{config_path}'
  - --data
  - '{dataset_path}'
  - --seed
  - '{seed}'
  - --output
  - '{output_path}'
  - --algorithm
  - REFS
  - --time_limit
  - '600'
  - --worker_num
  - '4'
  - --num_epoch
  - '5'
  - --feature_cache_entries
  - '200000'
  - --exclude_target_from_sources
  output_format: normalized_rules_json
  env:
    PYTHONPATH: /workspace
- name: CLNN
  source_url: https://openreview.net/forum?id=YfUICnZMwk7
  implementation_type: restricted_paper_based_reimplementation_weighted_clock_logic_tpp
  command:
  - python
  - -m
  - workspace.benchmark_models.baselines.logical_rule_baselines
  - --model
  - CLNN
  - --config
  - '{config_path}'
  - --data
  - '{dataset_path}'
  - --seed
  - '{seed}'
  - --output
  - '{output_path}'
  - --device
  - '{device}'
  - --grid_size
  - '24'
  - --epochs
  - '120'
  - --num_formulas
  - '8'
  - --max_rules
  - '8'
  - --max_rule_length
  - '3'
  - --exclude_target_from_sources
  output_format: normalized_rules_json
  env:
    PYTHONPATH: /workspace
- name: NSTPP
  source_url: https://proceedings.mlr.press/v235/yang24ag.html
  implementation_type: restricted_paper_based_reimplementation_neural_symbolic_tpp
  command:
  - python
  - -m
  - workspace.benchmark_models.baselines.logical_rule_baselines
  - --model
  - NSTPP
  - --config
  - '{config_path}'
  - --data
  - '{dataset_path}'
  - --seed
  - '{seed}'
  - --output
  - '{output_path}'
  - --device
  - '{device}'
  - --grid_size
  - '24'
  - --epochs
  - '120'
  - --refine_epochs
  - '60'
  - --search_restarts
  - '4'
  - --max_rules
  - '8'
  - --max_rule_length
  - '3'
  - --exclude_target_from_sources
  output_format: normalized_rules_json
  env:
    PYTHONPATH: /workspace
- name: CLUSTER
  source_url: https://proceedings.mlr.press/v238/kuang24a.html
  implementation_type: restricted_paper_based_reimplementation_latent_causal_rule_em
  command:
  - python
  - -m
  - workspace.benchmark_models.baselines.logical_rule_baselines
  - --model
  - CLUSTER
  - --config
  - '{config_path}'
  - --data
  - '{dataset_path}'
  - --seed
  - '{seed}'
  - --output
  - '{output_path}'
  - --device
  - '{device}'
  - --grid_size
  - '24'
  - --epochs
  - '60'
  - --em_iters
  - '3'
  - --max_rules
  - '8'
  - --max_rule_length
  - '3'
  - --dummy_count
  - '3'
  - --tau
  - '20.0'
  - --tau_min
  - '0.1'
  - --softmin_rho
  - '0.1'
  - --gamma_threshold
  - '0.0'
  - --exclude_target_from_sources
  output_format: normalized_rules_json
  env:
    PYTHONPATH: /workspace
