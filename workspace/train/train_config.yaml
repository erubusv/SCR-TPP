hnstpp:
  # GPU
  gpu: 0

  # Architecture
  num_rules: 12
  num_bins: 20            # M: piecewise-linear kernel grid divisions

  # Training
  epochs: 100
  batch_size: 64
  learning_rate: 3.0e-3
  weight_decay: 1.0e-4
  grad_clip: 5.0

  # Temperature annealing
  start_tau: 5.0
  end_tau: 0.5

  # Wiener-Hopf initialisation
  wh_delta_t: 0.1            # cross-covariance time resolution
  wh_max_lag: 10.0           # max lag for Wiener-Hopf
  wh_nnls_alpha: 1.0e-3      # L1 penalty for Joint NNLS (Phase 3)
  wh_pair_min_support: 2
  wh_pair_topk_per_target: 20
  wh_max_source_order: 3
  wh_phase3_support_tau: 20.0
  wh_phase3_source_pool_topk: 24
  wh_phase3_beta2: 0.5
  wh_phase3_beta3: 1.0
  wh_fixed_target: 12          # fixed target id for single-target WH init

  # Default init (overridden by Wiener-Hopf for assigned rules)
  init_b0: -3.0
  init_bias_raw: 0.0
  init_w_exc: -1.0
  init_w_inh: -1.0
  init_sign_std: 0.0

  # Integral (trapezoidal)
  integral_num_points: 64

  # Max-cap (kernel support)
  max_cap_percentile: 0.95
  max_cap_multiplier: 5.0

  # Regularisation
  lambda_ortho: 5.0e-3        # rule orthogonality
  lambda_h_sparse: 1.0e-3     # source mask sparsity
  lambda_h_binary: 1.0e-3     # source mask binarisation
  lambda_w_sparse: 1.0e-4     # weight L1
  lambda_overlap: 5.0e-3      # exc/inh overlap penalty
  lambda_sign_binary: 5.0e-3  # sign commitment
  lambda_head_entropy: 5.0e-3 # target assignment sharpness
  lambda_smooth: 1.0          # kernel height smoothness

  # Other
  sign_tau: 1.0
  epsilon: 1.0e-6
  i_max: 20.0

  # Save
  model_save_path: ./workspace/saved_models/HNSTPP
